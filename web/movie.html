<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0B0D12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>vast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0B0D12;
  --bg-card: #141620;
  --bg-elevated: #1A1D2A;
  --bg-hover: #222538;
  --border: rgba(255,255,255,0.06);
  --text: #F0EFF4;
  --text-secondary: #9392A0;
  --text-muted: #5E5D6B;
  --coral: #FB7185;
  --coral-dim: rgba(251,113,133,0.15);
  --coral-glow: rgba(251,113,133,0.3);
  --green: #34D399;
  --green-dim: rgba(52,211,153,0.12);
  --amber: #FBBF24;
  --blue: #60A5FA;
  --blue-dim: rgba(96,165,250,0.12);
  --red: #F87171;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Manrope', system-ui, -apple-system, sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

/* Back button */
.back-btn {
  position: fixed;
  top: calc(12px + var(--safe-top));
  left: 12px;
  z-index: 50;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: none;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
}
.back-btn:active { background: rgba(0,0,0,0.7); }
.back-btn svg { width: 22px; height: 22px; fill: currentColor; }

/* Backdrop */
.backdrop {
  position: relative;
  width: 100%;
  height: 50vh;
  min-height: 300px;
  overflow: hidden;
}
.backdrop img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 20%;
}
.backdrop-empty {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #141620 0%, #0B0D12 100%);
}
.backdrop::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
}

/* Movie info */
.movie {
  position: relative;
  z-index: 2;
  margin-top: -100px;
  padding: 0 20px 40px;
}
.movie-head {
  display: flex;
  gap: 16px;
  align-items: flex-end;
  margin-bottom: 20px;
}
.movie-poster {
  width: 100px;
  min-width: 100px;
  aspect-ratio: 2/3;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg-card);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.movie-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.movie-head-info { flex: 1; min-width: 0; }
.movie-title {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.movie-alt {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.movie-ratings {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.rating-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
}
.rating-kp { background: var(--amber); color: #000; }
.rating-imdb { background: rgba(245,197,24,0.15); color: var(--amber); border: 1px solid rgba(245,197,24,0.25); }

.movie-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text-secondary);
}
.movie-meta span { white-space: nowrap; }

.movie-genres {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.genre-chip {
  font-size: 11px;
  font-weight: 600;
  color: var(--coral);
  background: var(--coral-dim);
  padding: 5px 12px;
  border-radius: 20px;
}

.movie-desc {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.movie-desc.clamped {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  cursor: pointer;
}

/* Action button */
.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-user-select: none;
  user-select: none;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.action-btn:active { transform: scale(0.97); }
.action-btn svg { width: 20px; height: 20px; fill: currentColor; }
.action-btn.watch { background: var(--coral); color: #fff; }
.action-btn.download { background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); }
.action-btn.progress { background: var(--bg-elevated); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); pointer-events: none; }
.action-btn.progress .progress-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--blue-dim);
  transition: width 0.5s;
}

@media (hover: hover) {
  .action-btn.watch:hover { box-shadow: 0 0 32px var(--coral-glow); transform: scale(1.02); }
  .action-btn.download:hover { background: var(--bg-hover); }
}

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}
.info-cell {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.info-cell__label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.info-cell__value { font-size: 13px; font-weight: 600; }

/* Persons */
.section-label {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
}
.persons {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
  margin-bottom: 28px;
}
.persons::-webkit-scrollbar { display: none; }
.person {
  flex-shrink: 0;
  width: 72px;
  text-align: center;
}
.person-photo {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg-card);
  display: block;
  margin: 0 auto 6px;
}
.person-name { font-size: 10px; font-weight: 600; line-height: 1.3; }
.person-role { font-size: 9px; color: var(--text-muted); margin-top: 2px; }

/* Similar movies */
.similar {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.similar::-webkit-scrollbar { display: none; }
.sim-card {
  flex-shrink: 0;
  width: 110px;
  text-decoration: none;
  color: var(--text);
}
.sim-poster {
  width: 100%;
  aspect-ratio: 2/3;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg-card);
}
.sim-poster img { width: 100%; height: 100%; object-fit: cover; }
.sim-title { font-size: 11px; font-weight: 600; margin-top: 6px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Loading / Error */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  color: var(--text-muted);
  font-size: 14px;
}

/* Desktop */
@media (min-width: 1024px) {
  .backdrop { height: 60vh; min-height: 400px; }
  .movie { max-width: 1000px; margin: -160px auto 0; padding: 0 48px 60px; }
  .movie-head { gap: 28px; }
  .movie-poster { width: 200px; min-width: 200px; }
  .movie-title { font-size: 34px; }
  .movie-alt { font-size: 15px; }
  .movie-desc { max-width: 640px; font-size: 15px; }
  .action-btn { max-width: 320px; }
  .info-grid { grid-template-columns: repeat(3, 1fr); }
}


@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { opacity: 0; animation: fadeUp 0.5s ease forwards; }
</style>
</head>
<body>

<a class="back-btn" href="javascript:history.back()">
  <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
</a>

<div id="app">
  <div class="loading">Загрузка...</div>
</div>


<script>
var params = new URLSearchParams(location.search);
var kpId = params.get('kp_id');
var mediaId = params.get('media_id');

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Check if we have this movie downloaded
var localMedia = null;

async function init() {
  try {
    // load our media list to check if downloaded
    var mediaList = await fetch('/api/media').then(function(r) { return r.json(); });

    if (mediaId) {
      // opened from our library
      localMedia = mediaList.find(function(m) { return m.id === parseInt(mediaId); });
      if (localMedia && localMedia.kinopoisk_id) {
        kpId = localMedia.kinopoisk_id;
      }
    }

    if (!kpId && !localMedia) {
      document.getElementById('app').innerHTML = '<div class="loading">Фильм не найден</div>';
      return;
    }

    // try to match by kp_id
    if (kpId && !localMedia) {
      localMedia = mediaList.find(function(m) { return m.kinopoisk_id === String(kpId); });
    }

    // load KP data
    var movie = null;
    if (kpId) {
      var resp = await fetch('/api/kinopoisk/movie/' + kpId);
      if (resp.ok) movie = await resp.json();
    }

    // if no KP data, try title match
    if (!movie && localMedia) {
      var matchByTitle = mediaList.find(function(m) { return m.title && localMedia.title && m.title.toLowerCase() === localMedia.title.toLowerCase(); });
      // render with local data only
      renderLocal(localMedia);
      return;
    }

    if (!movie) {
      document.getElementById('app').innerHTML = '<div class="loading">Фильм не найден</div>';
      return;
    }

    render(movie);
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading">Ошибка загрузки</div>';
  }
}

function render(m) {
  var app = document.getElementById('app');
  app.innerHTML = '';

  document.title = (m.name || m.alternativeName || '') + ' - vast';

  // Backdrop
  var backdrop = document.createElement('div');
  backdrop.className = 'backdrop';
  if (m.backdrop && m.backdrop.url) {
    var img = document.createElement('img');
    img.src = m.backdrop.url;
    backdrop.appendChild(img);
  } else {
    var empty = document.createElement('div');
    empty.className = 'backdrop-empty';
    backdrop.appendChild(empty);
  }
  app.appendChild(backdrop);

  // Movie section
  var sec = document.createElement('div');
  sec.className = 'movie fade-in';

  // Head: poster + title + ratings
  var head = document.createElement('div');
  head.className = 'movie-head';

  var posterWrap = document.createElement('div');
  posterWrap.className = 'movie-poster';
  var poster = m.poster ? (m.poster.url || m.poster.previewUrl) : '';
  if (poster) {
    var pimg = document.createElement('img');
    pimg.src = poster;
    pimg.alt = m.name || '';
    posterWrap.appendChild(pimg);
  }
  head.appendChild(posterWrap);

  var headInfo = document.createElement('div');
  headInfo.className = 'movie-head-info';

  var title = document.createElement('h1');
  title.className = 'movie-title';
  title.textContent = m.name || m.alternativeName || '';
  headInfo.appendChild(title);

  if (m.alternativeName && m.name) {
    var alt = document.createElement('div');
    alt.className = 'movie-alt';
    alt.textContent = m.alternativeName;
    headInfo.appendChild(alt);
  }

  var ratings = document.createElement('div');
  ratings.className = 'movie-ratings';
  if (m.rating && m.rating.kp) {
    var rkp = document.createElement('span');
    rkp.className = 'rating-badge rating-kp';
    rkp.textContent = 'KP ' + m.rating.kp.toFixed(1);
    ratings.appendChild(rkp);
  }
  if (m.rating && m.rating.imdb) {
    var rimdb = document.createElement('span');
    rimdb.className = 'rating-badge rating-imdb';
    rimdb.textContent = 'IMDb ' + m.rating.imdb.toFixed(1);
    ratings.appendChild(rimdb);
  }
  headInfo.appendChild(ratings);
  head.appendChild(headInfo);
  sec.appendChild(head);

  // Meta: year, length, country, age
  var metaParts = [];
  if (m.year) metaParts.push(String(m.year));
  if (m.movieLength) metaParts.push(m.movieLength + ' мин');
  if (m.countries && m.countries.length) metaParts.push(m.countries.map(function(c) { return c.name; }).join(', '));
  if (m.ageRating) metaParts.push(m.ageRating + '+');

  if (metaParts.length) {
    var meta = document.createElement('div');
    meta.className = 'movie-meta';
    metaParts.forEach(function(t, i) {
      if (i > 0) {
        var dot = document.createElement('span');
        dot.textContent = '\u00b7';
        dot.style.color = 'var(--text-muted)';
        meta.appendChild(dot);
      }
      var s = document.createElement('span');
      s.textContent = t;
      meta.appendChild(s);
    });
    sec.appendChild(meta);
  }

  // Genres
  if (m.genres && m.genres.length) {
    var genres = document.createElement('div');
    genres.className = 'movie-genres';
    m.genres.forEach(function(g) {
      var chip = document.createElement('span');
      chip.className = 'genre-chip';
      chip.textContent = g.name;
      genres.appendChild(chip);
    });
    sec.appendChild(genres);
  }

  // Description
  if (m.description) {
    var desc = document.createElement('p');
    desc.className = 'movie-desc clamped';
    desc.textContent = m.description;
    desc.onclick = function() { desc.classList.toggle('clamped'); };
    sec.appendChild(desc);
  }

  // Action button
  var btn = document.createElement('a');
  if (localMedia && localMedia.status === 'ready') {
    btn.className = 'action-btn watch';
    btn.href = '#';
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      openDevicePicker(localMedia.id, m.name || m.alternativeName || '', poster);
    });
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Смотреть';
  } else if (localMedia && (localMedia.status === 'downloading' || localMedia.status === 'transcoding')) {
    btn.className = 'action-btn progress';
    btn.href = '#';
    btn.innerHTML = '<div class="progress-fill" id="progressFill"></div><span>Загружается...</span>';
    // start polling progress
    startProgressPoll(localMedia.id);
  } else {
    btn.className = 'action-btn download';
    // build download params
    var dlParams = new URLSearchParams({
      id: m.id,
      name: m.name || m.alternativeName || '',
      altName: m.alternativeName || '',
      year: m.year || '',
      poster: poster,
      backdrop: (m.backdrop && m.backdrop.url) || '',
      description: (m.description || '').substring(0, 500),
      ratingKp: (m.rating && m.rating.kp) ? m.rating.kp.toFixed(1) : '',
      ratingImdb: (m.rating && m.rating.imdb) ? m.rating.imdb.toFixed(1) : '',
      genres: (m.genres || []).map(function(g) { return g.name; }).join(',')
    });
    btn.href = '/download.html?' + dlParams.toString();
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Скачать';
  }
  sec.appendChild(btn);

  // Info grid
  var infos = [];
  if (m.budget && m.budget.value) infos.push(['Бюджет', '$' + m.budget.value.toLocaleString()]);
  if (m.fees && m.fees.world && m.fees.world.value) infos.push(['Сборы', '$' + m.fees.world.value.toLocaleString()]);
  if (m.premiere && m.premiere.russia) infos.push(['Премьера РФ', m.premiere.russia]);
  if (m.premiere && m.premiere.world) infos.push(['Мировая премьера', m.premiere.world]);

  if (infos.length) {
    var grid = document.createElement('div');
    grid.className = 'info-grid';
    infos.forEach(function(pair) {
      var cell = document.createElement('div');
      cell.className = 'info-cell';
      cell.innerHTML = '<div class="info-cell__label">' + esc(pair[0]) + '</div><div class="info-cell__value">' + esc(String(pair[1])) + '</div>';
      grid.appendChild(cell);
    });
    sec.appendChild(grid);
  }

  // Actors
  var actors = (m.persons || []).filter(function(p) { return p.enProfession === 'actor' && p.name; }).slice(0, 15);
  if (actors.length) {
    var label = document.createElement('h3');
    label.className = 'section-label';
    label.textContent = 'Актёры';
    sec.appendChild(label);

    var scroll = document.createElement('div');
    scroll.className = 'persons';
    actors.forEach(function(p) {
      var person = document.createElement('div');
      person.className = 'person';
      if (p.photo) {
        var ph = document.createElement('img');
        ph.className = 'person-photo';
        ph.src = p.photo;
        ph.alt = p.name;
        ph.loading = 'lazy';
        person.appendChild(ph);
      } else {
        var phEmpty = document.createElement('div');
        phEmpty.className = 'person-photo';
        person.appendChild(phEmpty);
      }
      var pn = document.createElement('div');
      pn.className = 'person-name';
      pn.textContent = p.name;
      person.appendChild(pn);
      if (p.description) {
        var pr = document.createElement('div');
        pr.className = 'person-role';
        pr.textContent = p.description;
        person.appendChild(pr);
      }
      scroll.appendChild(person);
    });
    sec.appendChild(scroll);
  }

  // Similar movies
  if (m.similarMovies && m.similarMovies.length) {
    var simLabel = document.createElement('h3');
    simLabel.className = 'section-label';
    simLabel.textContent = 'Похожие';
    sec.appendChild(simLabel);

    var simScroll = document.createElement('div');
    simScroll.className = 'similar';
    m.similarMovies.forEach(function(sm) {
      var a = document.createElement('a');
      a.className = 'sim-card';
      a.href = '/movie.html?kp_id=' + sm.id;
      var spw = document.createElement('div');
      spw.className = 'sim-poster';
      var sp = sm.poster ? (sm.poster.previewUrl || sm.poster.url) : '';
      if (sp) {
        var si = document.createElement('img');
        si.src = sp;
        si.loading = 'lazy';
        spw.appendChild(si);
      }
      a.appendChild(spw);
      var st = document.createElement('div');
      st.className = 'sim-title';
      st.textContent = sm.name || sm.alternativeName || '';
      a.appendChild(st);
      simScroll.appendChild(a);
    });
    sec.appendChild(simScroll);
  }

  app.appendChild(sec);
}

function renderLocal(m) {
  // simplified render for local-only media
  var app = document.getElementById('app');
  app.innerHTML = '';
  document.title = m.title + ' - vast';

  var backdrop = document.createElement('div');
  backdrop.className = 'backdrop';
  if (m.backdrop_url) {
    var img = document.createElement('img');
    img.src = m.backdrop_url;
    backdrop.appendChild(img);
  } else {
    var empty = document.createElement('div');
    empty.className = 'backdrop-empty';
    backdrop.appendChild(empty);
  }
  app.appendChild(backdrop);

  var sec = document.createElement('div');
  sec.className = 'movie fade-in';

  var head = document.createElement('div');
  head.className = 'movie-head';
  var posterWrap = document.createElement('div');
  posterWrap.className = 'movie-poster';
  if (m.poster_url) {
    var pi = document.createElement('img');
    pi.src = m.poster_url;
    posterWrap.appendChild(pi);
  }
  head.appendChild(posterWrap);

  var headInfo = document.createElement('div');
  headInfo.className = 'movie-head-info';
  var title = document.createElement('h1');
  title.className = 'movie-title';
  title.textContent = m.title;
  headInfo.appendChild(title);
  head.appendChild(headInfo);
  sec.appendChild(head);

  if (m.description) {
    var desc = document.createElement('p');
    desc.className = 'movie-desc';
    desc.textContent = m.description;
    sec.appendChild(desc);
  }

  var btn = document.createElement('a');
  if (m.status === 'ready') {
    btn.className = 'action-btn watch';
    btn.href = '#';
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      openDevicePicker(m.id, m.title, m.poster_url);
    });
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Смотреть';
  } else {
    btn.className = 'action-btn progress';
    btn.innerHTML = '<span>' + m.status + '</span>';
  }
  sec.appendChild(btn);
  app.appendChild(sec);
}

// ===========================================
// Open device picker (redirects to open.html)
// ===========================================
function openDevicePicker(id, title, poster) {
  var params = new URLSearchParams({ id: id });
  if (title) params.set('title', title);
  if (poster) params.set('poster', poster);
  window.location.href = '/open.html?' + params.toString();
}

function startProgressPoll(id) {
  var poll = setInterval(function() {
    fetch('/api/downloads').then(function(r) { return r.json(); }).then(function(list) {
      var dl = list.find(function(d) { return d.id === id; });
      if (dl) {
        var fill = document.getElementById('progressFill');
        if (fill) fill.style.width = dl.percent.toFixed(1) + '%';
        var span = document.querySelector('.action-btn.progress span');
        if (span) {
          var status = dl.status === 'transcoding' ? 'Конвертация' : 'Загрузка';
          span.textContent = status + '... ' + dl.percent.toFixed(0) + '%';
        }
      } else {
        // check if ready
        fetch('/api/media/' + id).then(function(r) { return r.json(); }).then(function(m) {
          if (m.status === 'ready') {
            clearInterval(poll);
            var btn = document.querySelector('.action-btn');
            btn.className = 'action-btn watch';
            btn.href = '/player.html?id=' + id;
            btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Смотреть';
          }
        });
      }
    });
  }, 3000);
}

init();
</script>
</body>
</html>
