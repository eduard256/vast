<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAST Downloads</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; padding: 20px; max-width: 700px; margin: 0 auto; }
h3 { margin-bottom: 16px; }
#add-form { border: 1px solid #ccc; padding: 12px; margin-bottom: 20px; }
#add-form input, #add-form select { width: 100%; padding: 6px; margin-bottom: 8px; font-family: monospace; font-size: 13px; }
#add-form button { padding: 8px 16px; cursor: pointer; font-family: monospace; }
#downloads { margin-top: 10px; }
.dl-item { border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; }
.dl-name { font-weight: bold; margin-bottom: 6px; }
.dl-bar { height: 16px; background: #eee; margin: 6px 0; position: relative; }
.dl-bar-fill { height: 100%; background: #4caf50; transition: width 0.5s; }
.dl-bar-text { position: absolute; top: 0; left: 6px; font-size: 11px; line-height: 16px; }
.dl-info { font-size: 12px; color: #666; }
.dl-actions { margin-top: 6px; }
.dl-actions button { padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 12px; }
.status-downloading { border-left: 4px solid #2196f3; }
.status-transcoding { border-left: 4px solid #ff9800; }
.status-ready { border-left: 4px solid #4caf50; }
.status-done { border-left: 4px solid #4caf50; }
.status-error { border-left: 4px solid #f44336; }
nav { margin-bottom: 16px; }
nav a { margin-right: 12px; }
</style>
</head>
<body>

<nav><a href="/library.html">Library</a> <a href="/downloads.html"><b>Downloads</b></a></nav>
<h3>Downloads</h3>

<div id="add-form">
  <input id="f-title" placeholder="Title">
  <input id="f-magnet" placeholder="Magnet link">
  <input id="f-poster" placeholder="Poster URL (optional)">
  <input id="f-desc" placeholder="Description (optional)">
  <select id="f-type"><option value="movie">Movie</option><option value="series">Series</option></select>
  <button onclick="addDownload()">Add</button>
</div>

<div id="downloads"></div>

<script>
const API = 'http://10.0.1.100:8990';
const container = document.getElementById('downloads');

function formatSize(bytes) {
  if (bytes > 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
  if (bytes > 1048576) return (bytes / 1048576).toFixed(0) + ' MB';
  return (bytes / 1024).toFixed(0) + ' KB';
}

function render(list) {
  container.textContent = '';

  if (!list || list.length === 0) {
    container.textContent = 'No active downloads';
    return;
  }

  for (const dl of list) {
    const div = document.createElement('div');
    div.className = 'dl-item status-' + dl.status;

    const pct = dl.percent.toFixed(1);

    const name = document.createElement('div');
    name.className = 'dl-name';
    name.textContent = dl.name || 'Loading metadata...';
    div.appendChild(name);

    const bar = document.createElement('div');
    bar.className = 'dl-bar';
    const fill = document.createElement('div');
    fill.className = 'dl-bar-fill';
    fill.style.width = pct + '%';
    bar.appendChild(fill);
    const barText = document.createElement('div');
    barText.className = 'dl-bar-text';
    barText.textContent = pct + '%';
    bar.appendChild(barText);
    div.appendChild(bar);

    if (dl.status === 'transcoding') {
      if (dl.audio_percent != null) {
        const abar = document.createElement('div');
        abar.className = 'dl-bar';
        const afill = document.createElement('div');
        afill.className = 'dl-bar-fill';
        afill.style.width = dl.audio_percent.toFixed(1) + '%';
        afill.style.background = '#ff9800';
        abar.appendChild(afill);
        const atext = document.createElement('div');
        atext.className = 'dl-bar-text';
        atext.textContent = 'Audio: ' + dl.audio_percent.toFixed(1) + '%';
        abar.appendChild(atext);
        div.appendChild(abar);
      }
      if (dl.video_percent != null) {
        const vbar = document.createElement('div');
        vbar.className = 'dl-bar';
        const vfill = document.createElement('div');
        vfill.className = 'dl-bar-fill';
        vfill.style.width = dl.video_percent.toFixed(1) + '%';
        vfill.style.background = '#2196f3';
        vbar.appendChild(vfill);
        const vtext = document.createElement('div');
        vtext.className = 'dl-bar-text';
        vtext.textContent = 'Video: ' + dl.video_percent.toFixed(1) + '%';
        vbar.appendChild(vtext);
        div.appendChild(vbar);
      }
    }

    const info = document.createElement('div');
    info.className = 'dl-info';
    let infoText = formatSize(dl.done) + ' / ' + formatSize(dl.total) + ' | Status: ' + dl.status;
    if (dl.status === 'downloading') {
      infoText += ' | Seeds: ' + dl.seeds;
    }
    info.textContent = infoText;
    div.appendChild(info);

    const actions = document.createElement('div');
    actions.className = 'dl-actions';
    const delBtn = document.createElement('button');
    delBtn.textContent = 'Delete';
    delBtn.onclick = function() { removeDl(dl.hash); };
    actions.appendChild(delBtn);
    div.appendChild(actions);

    container.appendChild(div);
  }
}

async function fetchDownloads() {
  try {
    const r = await fetch(API + '/api/downloads');
    const list = await r.json();
    render(list);
  } catch(e) {}
}

async function addDownload() {
  const title = document.getElementById('f-title').value.trim();
  const magnet = document.getElementById('f-magnet').value.trim();
  const poster = document.getElementById('f-poster').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const type = document.getElementById('f-type').value;

  if (!title || !magnet) { alert('Title and magnet required'); return; }

  await fetch(API + '/api/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title, magnet, poster_url: poster, description: desc, type})
  });

  document.getElementById('f-title').value = '';
  document.getElementById('f-magnet').value = '';
  document.getElementById('f-poster').value = '';
  document.getElementById('f-desc').value = '';
  fetchDownloads();
}

async function removeDl(hash) {
  await fetch(API + '/api/downloads/' + hash, {method: 'DELETE'});
  fetchDownloads();
}

setInterval(fetchDownloads, 3000);
fetchDownloads();
</script>
</body>
</html>
