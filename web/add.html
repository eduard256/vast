<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAST -- Add</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #0a0a0c;
  --surface: #12121a;
  --surface-2: #1a1a26;
  --border: #2a2a3a;
  --text: #e8e6e3;
  --text-dim: #8a8898;
  --accent: #c4a35a;
  --accent-glow: #c4a35a44;
  --kp-orange: #f60;
  --imdb-yellow: #f5c518;
  --green: #4ade80;
  --red: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* -- Backdrop -- */
.backdrop {
  position: relative;
  width: 100%;
  height: 480px;
  overflow: hidden;
}

.backdrop img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 20%;
  filter: brightness(0.5) saturate(0.7);
}

.backdrop-empty {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1a1a2e 0%, #0a0a14 50%, #16213e 100%);
}

.backdrop::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70%;
  background: linear-gradient(to top, var(--bg) 0%, var(--bg) 15%, transparent 100%);
}

.backdrop::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(to right, var(--bg) 0%, transparent 30%, transparent 70%, var(--bg) 100%);
  z-index: 1;
}

/* -- Nav -- */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 16px 32px;
  background: linear-gradient(to bottom, rgba(10,10,12,0.9) 0%, transparent 100%);
}

nav a {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  margin-right: 20px;
  letter-spacing: 0.5px;
  transition: color 0.2s;
}

nav a:hover { color: var(--text); }
nav .brand { color: var(--accent); font-weight: 700; font-size: 14px; }

/* -- Content -- */
.content {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: -200px auto 0;
  padding: 0 32px 60px;
}

.movie-layout {
  display: flex;
  gap: 40px;
  align-items: flex-start;
}

/* -- Poster -- */
.poster {
  flex-shrink: 0;
  width: 260px;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px var(--border);
  position: relative;
}

.poster img {
  width: 100%;
  display: block;
}

.poster-empty {
  width: 100%;
  aspect-ratio: 2/3;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 13px;
  text-align: center;
  padding: 20px;
}

/* -- Info -- */
.info {
  flex: 1;
  min-width: 0;
}

.title {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.alt-name {
  font-size: 16px;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 16px;
}

.meta-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 12px;
  color: var(--text-dim);
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 3px;
  letter-spacing: 0.5px;
}

.rating {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 3px;
}

.rating-kp {
  background: rgba(255, 102, 0, 0.15);
  color: var(--kp-orange);
  border: 1px solid rgba(255, 102, 0, 0.3);
}

.rating-imdb {
  background: rgba(245, 197, 24, 0.12);
  color: var(--imdb-yellow);
  border: 1px solid rgba(245, 197, 24, 0.25);
}

.rating-label {
  font-size: 10px;
  font-weight: 400;
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.genres {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.genre {
  font-size: 11px;
  color: var(--accent);
  padding: 3px 10px;
  border: 1px solid var(--accent-glow);
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.description {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 32px;
  max-width: 600px;
}

/* -- Torrent section -- */
.torrent-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 24px;
  margin-bottom: 24px;
}

.torrent-header {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.torrent-title {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  font-weight: 400;
  margin-bottom: 14px;
  word-break: break-word;
}

.torrent-meta {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.torrent-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.torrent-stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}

.torrent-stat-value {
  font-size: 15px;
  font-weight: 600;
}

.torrent-stat-value.seeders { color: var(--green); }
.torrent-stat-value.tracker { color: var(--accent); }

/* -- Download button -- */
.download-btn {
  display: block;
  width: 100%;
  padding: 18px 32px;
  background: linear-gradient(135deg, var(--accent) 0%, #a88a3a 100%);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.download-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

.download-btn:active {
  transform: translateY(0);
}

.download-btn.loading {
  pointer-events: none;
  opacity: 0.7;
}

.download-btn.success {
  background: linear-gradient(135deg, var(--green) 0%, #22c55e 100%);
  pointer-events: none;
}

.download-btn.error {
  background: linear-gradient(135deg, var(--red) 0%, #dc2626 100%);
}

/* -- Status message -- */
.status-msg {
  text-align: center;
  padding: 12px;
  font-size: 13px;
  margin-top: 12px;
  border-radius: 4px;
  display: none;
}

.status-msg.visible { display: block; }
.status-msg.ok { color: var(--green); background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }
.status-msg.err { color: var(--red); background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); }

/* -- Responsive -- */
@media (max-width: 768px) {
  .backdrop { height: 300px; }
  .content { margin-top: -120px; padding: 0 16px 40px; }
  .movie-layout { flex-direction: column; gap: 24px; }
  .poster { width: 180px; margin: 0 auto; }
  .title { font-size: 24px; text-align: center; }
  .alt-name { text-align: center; }
  .meta-row { justify-content: center; }
  .genres { justify-content: center; }
  .description { text-align: center; margin: 0 auto 32px; }
  .torrent-meta { gap: 16px; }
  nav { padding: 12px 16px; }
}

/* -- Animations -- */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.poster { animation: fadeUp 0.6s ease-out 0.1s both; }
.info > * { animation: fadeUp 0.5s ease-out both; }
.title { animation-delay: 0.15s; }
.alt-name { animation-delay: 0.2s; }
.meta-row { animation-delay: 0.25s; }
.genres { animation-delay: 0.3s; }
.description { animation-delay: 0.35s; }
.torrent-section { animation: fadeUp 0.5s ease-out 0.4s both; }
.download-btn { animation: fadeUp 0.5s ease-out 0.45s both; }
</style>
</head>
<body>

<nav>
  <a href="/" class="brand">VAST</a>
  <a href="/library.html">Library</a>
  <a href="/downloads.html">Downloads</a>
</nav>

<div class="backdrop" id="backdrop"></div>

<div class="content">
  <div class="movie-layout">
    <div class="poster" id="poster"></div>
    <div class="info">
      <div class="title" id="title"></div>
      <div class="alt-name" id="altName"></div>
      <div class="meta-row" id="metaRow"></div>
      <div class="genres" id="genres"></div>
      <div class="description" id="description"></div>

      <div class="torrent-section">
        <div class="torrent-header">Torrent</div>
        <div class="torrent-title" id="torrentTitle"></div>
        <div class="torrent-meta">
          <div class="torrent-stat">
            <span class="torrent-stat-label">Size</span>
            <span class="torrent-stat-value" id="torrentSize">--</span>
          </div>
          <div class="torrent-stat">
            <span class="torrent-stat-label">Tracker</span>
            <span class="torrent-stat-value tracker" id="torrentTracker">--</span>
          </div>
          <div class="torrent-stat">
            <span class="torrent-stat-label">Seeders</span>
            <span class="torrent-stat-value seeders" id="torrentSeeders">--</span>
          </div>
        </div>
      </div>

      <div class="download-btn loading" id="downloadBtn">Adding...</div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>
</div>

<script>
const API = 'http://10.0.1.100:8990';
const p = new URLSearchParams(location.search);

// fill backdrop
const backdropEl = document.getElementById('backdrop');
const backdropUrl = p.get('backdrop');
if (backdropUrl) {
  const img = document.createElement('img');
  img.src = backdropUrl;
  img.alt = '';
  backdropEl.appendChild(img);
} else {
  const div = document.createElement('div');
  div.className = 'backdrop-empty';
  backdropEl.appendChild(div);
}

// fill poster
const posterEl = document.getElementById('poster');
const posterUrl = p.get('poster');
if (posterUrl) {
  const img = document.createElement('img');
  img.src = posterUrl;
  img.alt = p.get('name') || '';
  posterEl.appendChild(img);
} else {
  const div = document.createElement('div');
  div.className = 'poster-empty';
  div.textContent = p.get('name') || 'No poster';
  posterEl.appendChild(div);
}

// fill info
document.getElementById('title').textContent = p.get('name') || '';
document.getElementById('altName').textContent = p.get('altName') || '';
document.getElementById('description').textContent = p.get('description') || '';
document.getElementById('torrentTitle').textContent = p.get('torrentTitle') || '';
document.getElementById('torrentSize').textContent = p.get('torrentSize') || '--';
document.getElementById('torrentTracker').textContent = p.get('torrentTracker') || '--';
document.getElementById('torrentSeeders').textContent = p.get('torrentSeeders') || '--';

// meta row: year + ratings
const metaRow = document.getElementById('metaRow');
const year = p.get('year');
if (year) {
  const tag = document.createElement('span');
  tag.className = 'meta-tag';
  tag.textContent = year;
  metaRow.appendChild(tag);
}

const ratingKp = p.get('ratingKp');
if (ratingKp) {
  const r = document.createElement('span');
  r.className = 'rating rating-kp';
  const label = document.createElement('span');
  label.className = 'rating-label';
  label.textContent = 'KP';
  r.appendChild(label);
  r.appendChild(document.createTextNode(' ' + ratingKp));
  metaRow.appendChild(r);
}

const ratingImdb = p.get('ratingImdb');
if (ratingImdb) {
  const r = document.createElement('span');
  r.className = 'rating rating-imdb';
  const label = document.createElement('span');
  label.className = 'rating-label';
  label.textContent = 'IMDb';
  r.appendChild(label);
  r.appendChild(document.createTextNode(' ' + ratingImdb));
  metaRow.appendChild(r);
}

// genres
const genresEl = document.getElementById('genres');
const genresStr = p.get('genres');
if (genresStr) {
  genresStr.split(',').forEach(function(g) {
    const span = document.createElement('span');
    span.className = 'genre';
    span.textContent = g.trim();
    genresEl.appendChild(span);
  });
}

// download
async function startDownload() {
  const btn = document.getElementById('downloadBtn');
  const msg = document.getElementById('statusMsg');

  btn.textContent = 'Sending...';
  btn.className = 'download-btn loading';
  msg.className = 'status-msg';

  const body = {
    title: p.get('name') || '',
    alt_name: p.get('altName') || '',
    description: p.get('description') || '',
    poster_url: p.get('poster') || '',
    backdrop_url: p.get('backdrop') || '',
    year: parseInt(p.get('year')) || 0,
    kinopoisk_id: p.get('id') || '',
    rating_kp: parseFloat(p.get('ratingKp')) || 0,
    rating_imdb: parseFloat(p.get('ratingImdb')) || 0,
    genres: p.get('genres') || '',
    magnet: p.get('magnet') || '',
    type: 'movie',
    torrent_title: p.get('torrentTitle') || '',
    torrent_size: p.get('torrentSize') || '',
    torrent_tracker: p.get('torrentTracker') || '',
    torrent_seeders: parseInt(p.get('torrentSeeders')) || 0
  };

  try {
    const r = await fetch(API + '/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await r.json();

    if (data.error) {
      btn.textContent = 'Error';
      btn.className = 'download-btn error';
      msg.textContent = data.error;
      msg.className = 'status-msg visible err';
      return;
    }

    btn.textContent = 'Added';
    btn.className = 'download-btn success';
    msg.textContent = 'Download started. Redirecting to library...';
    msg.className = 'status-msg visible ok';

    setTimeout(function() {
      location.href = '/downloads.html';
    }, 2000);
  } catch(e) {
    btn.textContent = 'Connection error';
    btn.className = 'download-btn error';
    msg.textContent = e.message;
    msg.className = 'status-msg visible err';
  }
}

// set page title
document.title = 'VAST -- ' + (p.get('name') || 'Add');

// auto-start download
startDownload();
</script>
</body>
</html>
