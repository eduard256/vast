<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAST Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; padding: 20px; max-width: 600px; margin: 0 auto; }
#status { padding: 8px; margin-bottom: 10px; background: #eee; font-size: 14px; }
#messages { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
.msg { margin-bottom: 8px; white-space: pre-wrap; }
.msg-person { color: #00f; }
.msg-ai { color: #060; }
.msg-tool { color: #999; font-size: 12px; }
#input-row { display: flex; gap: 8px; }
#input { flex: 1; padding: 8px; font-family: monospace; font-size: 14px; }
button { padding: 8px 16px; cursor: pointer; font-family: monospace; }
#btn-clear { margin-left: 8px; }
</style>
</head>
<body>

<nav><a href="/"><b>Chat</b></a> <a href="/library.html">Library</a> <a href="/downloads.html">Downloads</a></nav>
<h3>VAST Chat</h3>
<div id="status">Loading...</div>
<div id="messages"></div>
<div id="input-row">
  <input id="input" placeholder="Message..." autocomplete="off">
  <button id="btn-send">Send</button>
  <button id="btn-clear">Clear</button>
</div>

<script>
const API = 'http://10.0.1.100:8990';
const messagesDiv = document.getElementById('messages');
const statusDiv = document.getElementById('status');
const input = document.getElementById('input');
const btnSend = document.getElementById('btn-send');
const btnClear = document.getElementById('btn-clear');

let lastCount = 0;
let aiWorking = false;

function formatTime(ms) {
  const d = new Date(ms);
  return d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function renderMessages(msgs) {
  if (msgs.length === lastCount) return;
  lastCount = msgs.length;

  messagesDiv.textContent = '';
  for (const m of msgs) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + m.from;

    const time = document.createElement('span');
    time.style.cssText = 'color:#999;font-size:12px;margin-right:6px';
    time.textContent = formatTime(m.time);

    const name = document.createElement('b');
    name.textContent = m.from + ': ';

    const text = document.createTextNode(m.text);

    div.appendChild(time);
    div.appendChild(name);
    div.appendChild(text);
    messagesDiv.appendChild(div);
  }
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function fetchMessages() {
  try {
    const r = await fetch(API + '/api/chat/messages');
    const msgs = await r.json();
    renderMessages(msgs);
  } catch(e) {}
}

async function fetchStatus() {
  try {
    const r = await fetch(API + '/api/chat/status');
    const s = await r.json();
    aiWorking = s.working;

    if (s.working) {
      statusDiv.textContent = 'AI working... (' + s.tools_used + ' tools used)';
      statusDiv.style.background = '#ffe0b2';
      btnSend.textContent = 'Stop';
    } else {
      statusDiv.textContent = 'AI idle';
      statusDiv.style.background = '#c8e6c9';
      btnSend.textContent = 'Send';
    }
  } catch(e) {
    statusDiv.textContent = 'Connection error';
    statusDiv.style.background = '#ffcdd2';
  }
}

async function send() {
  if (aiWorking) {
    await fetch(API + '/api/chat/stop', {method: 'POST'});
    return;
  }

  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  await fetch(API + '/api/chat/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text})
  });

  fetchMessages();
  fetchStatus();
}

async function clear() {
  await fetch(API + '/api/chat/clear', {method: 'POST'});
  lastCount = 0;
  messagesDiv.textContent = '';
  fetchStatus();
}

btnSend.addEventListener('click', send);
btnClear.addEventListener('click', clear);
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') send();
});

setInterval(fetchMessages, 3000);
setInterval(fetchStatus, 3000);
fetchMessages();
fetchStatus();
</script>
</body>
</html>
