<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAST Library</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; padding: 20px; max-width: 900px; margin: 0 auto; }
nav { margin-bottom: 16px; }
nav a { margin-right: 12px; }
h3 { margin-bottom: 12px; }
#stats { font-size: 13px; color: #666; margin-bottom: 16px; }
#grid { display: flex; flex-wrap: wrap; gap: 16px; }
.card { width: 160px; cursor: pointer; }
.card-poster { width: 160px; height: 240px; background: #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card-poster img { width: 100%; height: 100%; object-fit: cover; }
.card-poster-empty { color: #999; font-size: 12px; text-align: center; padding: 10px; }
.card-title { font-size: 13px; font-weight: bold; margin-top: 6px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.card-info { font-size: 11px; color: #666; }
.card-status { font-size: 10px; margin-top: 2px; padding: 2px 6px; display: inline-block; }
.status-ready { background: #c8e6c9; }
.status-downloading { background: #bbdefb; }
.status-transcoding { background: #ffe0b2; }
.status-error { background: #ffcdd2; }
#empty { color: #999; }
</style>
</head>
<body>

<nav><a href="/">Chat</a> <a href="/library.html"><b>Library</b></a> <a href="/downloads.html">Downloads</a></nav>
<h3>Library</h3>
<div id="stats"></div>
<div id="grid"></div>
<div id="empty"></div>

<script>
const API = 'http://10.0.1.100:8990';
const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
const empty = document.getElementById('empty');

let lastTotal = -1;

async function checkCount() {
  try {
    const r = await fetch(API + '/api/media/count');
    const c = await r.json();
    stats.textContent = 'Movies: ' + c.movies + ' | Series: ' + c.series + ' | Total: ' + c.total;

    if (c.total !== lastTotal) {
      lastTotal = c.total;
      await fetchMedia();
    }
  } catch(e) {}
}

async function fetchMedia() {
  try {
    const r = await fetch(API + '/api/media');
    const list = await r.json();
    render(list);
  } catch(e) {}
}

function render(list) {
  grid.textContent = '';

  if (!list || list.length === 0) {
    empty.textContent = 'Library is empty';
    return;
  }
  empty.textContent = '';

  for (const m of list) {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = function() { location.href = '/player.html?id=' + m.id; };

    const poster = document.createElement('div');
    poster.className = 'card-poster';
    if (m.poster_url) {
      const img = document.createElement('img');
      img.src = m.poster_url;
      img.alt = m.title;
      poster.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-poster-empty';
      ph.textContent = m.title;
      poster.appendChild(ph);
    }
    card.appendChild(poster);

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = m.title;
    card.appendChild(title);

    const info = document.createElement('div');
    info.className = 'card-info';
    const parts = [];
    if (m.year) parts.push(m.year);
    parts.push(m.type);
    info.textContent = parts.join(' | ');
    card.appendChild(info);

    const status = document.createElement('div');
    status.className = 'card-status status-' + m.status;
    status.textContent = m.status;
    card.appendChild(status);

    grid.appendChild(card);
  }
}

setInterval(checkCount, 3000);
checkCount();
</script>
</body>
</html>
